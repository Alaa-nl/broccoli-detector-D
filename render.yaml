# Render Blueprint for the BroccoliDetect proof of concept.
#
# Deploy with: https://dashboard.render.com/blueprints
# (Render reads this file from the repo root.)
#
# Two services:
#   - backend   FastAPI + YOLOv8n
#   - frontend  React + Nginx (proxies /api/ and /uploads/ to backend)
#
# Why we route the frontend → backend over the *public* URL instead of
# Render's private network: nginx's `resolver` talks raw UDP/53, and
# Render's private DNS isn't reachable that way. Public DNS works
# reliably. The latency cost is negligible for this PoC.

services:
  - type: web
    name: broccoli-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    name: broccoli-frontend
    runtime: docker
    plan: free
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      # Hardcoded because Render's fromService.property has no value
      # that returns the public *.onrender.com URL. If the backend
      # service is renamed/recreated, update these three values.
      - key: BACKEND_SCHEME
        value: https
      - key: BACKEND_HOST
        value: broccoli-backend-00na.onrender.com
      - key: BACKEND_PORT
        value: "443"
