# Nginx config for the BroccoliDetect frontend container.
#
# It serves the built React files as static content,
# and forwards /api and /uploads requests to the backend container
# (which is named 'backend' inside docker-compose's network).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routes, so any unknown URL
    # should serve index.html (the React app will handle it).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 15M;
    }

    # Forward uploaded image requests too.
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
